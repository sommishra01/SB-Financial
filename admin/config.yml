backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "blogs"
    label: "Blogs"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Blog Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "SEO Description", name: "description", widget: "text" }
      - { label: "Category", name: "category", widget: "select", options: ["Mutual Funds", "SIP", "Insurance", "Tax Saving", "Stock Market", "Financial Planning"] }
      - { label: "Blog Content", name: "body", widget: "markdown" }
