name: Generate Blog Pages

on:
  push:
    paths:
      - 'posts/*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate blog pages
        run: |
          mkdir -p blog

          for file in posts/*.md; do
            filename=$(basename "$file")
            slug="${filename%.md}"

            mkdir -p "blog/$slug"

            sed "s/__SLUG__/$slug/g" blog-template.html > "blog/$slug/index.html"
          done

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add blog/
          git commit -m "Auto-generated blog pages" || echo "No changes"
          git push
