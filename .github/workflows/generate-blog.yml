name: Generate Blog Pages

permissions:
  contents: write

on:
  push:
    paths:
      - 'posts/*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate blog pages
        run: |
          mkdir -p blog

          for file in posts/*.md; do
            slug=$(basename "$file" .md)

            mkdir -p "blog/$slug"

            sed "s|__SLUG__|$slug|g" blog-template.html > "blog/$slug/index.html"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add blog/

          # Only commit if changes exist
          git diff --cached --quiet || git commit -m "Auto-generate blog pages"

          git push
