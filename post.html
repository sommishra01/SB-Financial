<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Post - SB Financial</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>
  <script src="https://kit.fontawesome.com/53ad980c15.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="progress-bar"></div>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">SB Financial</a>
      <div class="menu-toggle"><i class="fas fa-bars"></i></div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/services">Services</a></li>
        <li><a href="/calculators">Calculators</a></li>
        <li><a href="/blog">Blog</a></li>
        <li><a href="/contact">Contact</a></li>
      </ul>
    </div>
  </header>

  <!-- Blog Post -->
  <section class="features" style="padding-top: 8rem;">
    <div class="container" style="max-width: 900px;">
      <div id="post-content">
        <h1>Loading...</h1>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-container">
      <p>&copy; 2025 SB Financial. Made with ❤️ by Shashwat Bajpai.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      const postContainer = document.getElementById("post-content");

      if (!slug) {
        postContainer.innerHTML = "<h1>Post not found</h1><p>No slug provided.</p>";
        return;
      }

      try {
        // Load markdown file directly
        const mdPath = `posts/${slug}.md`;
        const res = await fetch(mdPath);

        if (!res.ok) {
          throw new Error("Blog file not found");
        }

        const mdText = await res.text();

        // Extract frontmatter
        const frontmatterMatch = mdText.match(/^---\n([\s\S]*?)\n---/);
        let meta = {};

        if (frontmatterMatch) {
          const lines = frontmatterMatch[1].split("\n");

          lines.forEach(line => {
            const [key, ...rest] = line.split(":");
            if (key && rest.length) {
              meta[key.trim()] = rest.join(":").trim();
            }
          });
        }

        // Remove frontmatter from content
        let content = mdText.replace(/^---[\s\S]*?---/, "").trim();

        if (!content) {
          content = "No blog content available.";
        }

        document.title = `${meta.title || slug} - SB Financial`;

        // Render HTML
        postContainer.innerHTML = `
  ${meta.image ? `
    <div class="post-hero">
      <img src="${meta.image}" alt="${meta.title}">
      <div class="post-hero-content">
        <span>${meta.category || ""}</span>
        <h1>${meta.title || slug}</h1>
        <div class="post-meta">
          ${meta.date ? new Date(meta.date).toDateString() : ""} • ${meta.author || "SB Financial"}
        </div>
      </div>
    </div>
  ` : ""}

  <div class="blog-post-body">
    ${marked.parse(content)}
  </div>

  <div class="share-buttons">
    <a href="https://wa.me/?text=${encodeURIComponent(window.location.href)}" target="_blank">WhatsApp</a>
    <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}" target="_blank">Twitter</a>
    <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank">LinkedIn</a>
  </div>
`;

      } catch (error) {
        console.error(error);
        postContainer.innerHTML = `
          <h1>Error loading post</h1>
          <p>${error.message}</p>
        `;
      }
    }

    loadPost();
  </script>
  <script>
window.addEventListener("scroll", () => {
  const scrollTop = document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const progress = (scrollTop / height) * 100;

  document.getElementById("progress-bar").style.width = progress + "%";
});
  </script>

</body>
</html>
